dataset:
  _target_: training.data.composed_dataset.ComposedDataset
  dataset_configs:
    - _target_: training.data.datasets.agibot_world.AgiBotWorldDataset
      AGIBOT_WORLD_DIR: /path/to/real-train-data
      split: all_train
      dataset_name: agibot_world

    - _target_: training.data.datasets.agibot_sim.AgiBotSimDataset
      AGIBOT_SIM_DIR: /path/to/sim-train-data
      split: all_train
      dataset_name: agibot_sim
    

common_config:
  # Augmentation settings
  augs:
    scales: [0.8, 1]
    color_jitter: Null                  # Use default color jitter
    gray_scale: True                    # Probability of converting to grayscale
    gau_blur: True                      # Probability of applying Gaussian blur
    cojitter: True                      # Apply identical jitter to all frames
    cojitter_ratio: 0.5                 # Probability of using shared jitter

  # Fixed settings
  fix_img_num: 0                        # Force each sequence to have 5 images
  fix_aspect_ratio: 1.0                 # Force aspect ratio to be 1:1

  # Track settings
  load_track: False                      # Whether to load precomputed tracks
  track_num: 0                           # Number of tracks per sequence

  # Mode settings
  training: True                        # Whether the dataset is in training mode
  inside_random: True                   # Disable random sampling across datasets

  img_size: 518
  patch_size: 14
  landscape_check: True
  rescale: True
  rescale_aug: True
  aspects: [0.5, 1]
  img_nums: [3, 3]